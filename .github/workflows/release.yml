name: Release

run-name: "Release ${{ inputs.version }}"

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to release, for example 0.1.0-alpha.1
        required: true
        type: string
      prerelease:
        description: Mark this release as a prerelease
        required: true
        default: true
        type: boolean

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Verify workspace versions
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          input_version="${{ inputs.version }}"
          client_version=$(node -e "const fs=require('fs'); const cfg=JSON.parse(fs.readFileSync('apps/client/src-tauri/tauri.conf.json','utf8')); process.stdout.write(cfg.version);")
          workspace_version=$(awk '
            /^\[workspace\.package\]/ { in_section = 1; next }
            /^\[/ { if (in_section) exit }
            in_section && /version[[:space:]]*=/ {
              if (match($0, /"[^"]+"/)) {
                print substr($0, RSTART + 1, RLENGTH - 2)
                exit
              }
            }
          ' Cargo.toml)

          if [ "$client_version" != "$input_version" ]; then
            echo "client version mismatch: expected $input_version, got $client_version" >&2
            exit 1
          fi

          if [ "$workspace_version" != "$input_version" ]; then
            echo "workspace version mismatch: expected $input_version, got $workspace_version" >&2
            exit 1
          fi

          echo "version=$input_version" >> "$GITHUB_OUTPUT"
          echo "release_tag=$input_version" >> "$GITHUB_OUTPUT"
          echo "prerelease=${{ inputs.prerelease }}" >> "$GITHUB_OUTPUT"

  create-release:
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Create draft release
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare.outputs.release_tag }}"
          name="Version ${{ needs.prepare.outputs.version }}"

          if gh release view "$tag" > /dev/null 2>&1; then
            echo "Release $tag already exists." >&2
            exit 1
          fi

          flags=(--draft)
          if [ "${{ needs.prepare.outputs.prerelease }}" = "true" ]; then
            flags+=(--prerelease)
          fi

          gh release create "$tag" --title "$name" --notes "See CHANGELOG.md for release notes." "${flags[@]}"

  client:
    needs:
      - prepare
      - create-release
    permissions:
      contents: write
    uses: ./.github/workflows/client.yml
    secrets: inherit
    with:
      version: ${{ needs.prepare.outputs.version }}
      release_tag: ${{ needs.prepare.outputs.release_tag }}
      prerelease: ${{ needs.prepare.outputs.prerelease == 'true' }}

  server:
    needs:
      - prepare
      - create-release
    permissions:
      contents: write
    uses: ./.github/workflows/server.yml
    secrets: inherit
    with:
      version: ${{ needs.prepare.outputs.version }}
      release_tag: ${{ needs.prepare.outputs.release_tag }}

  docker:
    needs:
      - prepare
      - create-release
    permissions:
      contents: read
    uses: ./.github/workflows/docker.yml
    secrets: inherit
    with:
      version: ${{ needs.prepare.outputs.version }}
      prerelease: ${{ needs.prepare.outputs.prerelease == 'true' }}

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - client
      - server
      - docker
    if: ${{ needs.client.result == 'success' && needs.server.result == 'success' && needs.docker.result == 'success' }}
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Publish draft release
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare.outputs.release_tag }}"
          gh release edit "$tag" --draft=false
