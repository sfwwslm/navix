name: Docker Publish

on:
  workflow_call:
    inputs:
      version:
        description: Version to release
        required: true
        type: string
      prerelease:
        description: Whether this is a prerelease
        required: false
        default: false
        type: boolean

jobs:
  publish-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Verify server version
        shell: bash
        run: |
          set -euo pipefail
          cargo_version="$(awk '
            /^\[workspace\.package\]/ { in_section = 1; next }
            /^\[/ { if (in_section) exit }
            in_section && /version[[:space:]]*=/ {
              if (match($0, /"[^"]+"/)) {
                print substr($0, RSTART + 1, RLENGTH - 2)
                exit
              }
            }
          ' Cargo.toml)"
          if [ -z "$cargo_version" ]; then
            echo "Unable to read version from Cargo.toml" >&2
            exit 1
          fi
          if [ "$cargo_version" != "${{ inputs.version }}" ]; then
            echo "version mismatch: expected ${{ inputs.version }}, got $cargo_version" >&2
            exit 1
          fi

      - name: Compute image tags
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          image="${{ secrets.DOCKERHUB_USERNAME }}/navix-server"
          tags=("${image}:${{ inputs.version }}")
          if [ "${{ inputs.prerelease }}" = "false" ]; then
            tags+=("${image}:latest")
          fi
          echo "image=$image" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            printf '%s\n' "${tags[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/server/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=navix-server-docker
          cache-to: type=gha,mode=max,scope=navix-server-docker

      - name: Sync Docker Hub README
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ steps.meta.outputs.image }}
          readme-filepath: README.md
