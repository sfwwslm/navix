name: Client Publish

env:
  NODE_VERSION: "24"

on:
  workflow_call:
    inputs:
      version:
        description: Version to release
        required: true
        type: string
      release_tag:
        description: GitHub Release tag
        required: true
        type: string
      prerelease:
        description: Whether this is a prerelease
        required: false
        default: false
        type: boolean

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          # - os: windows-latest
          #   target: aarch64-pc-windows-msvc
          # - os: ubuntu-22.04
          #   target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: client-${{ matrix.os }}-${{ matrix.target }}
          workspaces: |
            . -> target

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Verify client version
        shell: bash
        run: |
          set -euo pipefail
          actual_version=$(node -e "const fs=require('fs'); const cfg=JSON.parse(fs.readFileSync('apps/client/src-tauri/tauri.conf.json','utf8')); process.stdout.write(cfg.version);")
          if [ "$actual_version" != "${{ inputs.version }}" ]; then
            echo "client version mismatch: expected ${{ inputs.version }}, got $actual_version" >&2
            exit 1
          fi

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build client and upload assets
        uses: tauri-apps/tauri-action@v0.6.1
        env:
          NODE_OPTIONS: --max_old_space_size=4096
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ inputs.release_tag }}
          releaseName: Version __VERSION__
          releaseBody: Automated client assets for ${{ inputs.release_tag }}.
          releaseDraft: true
          prerelease: ${{ inputs.prerelease }}
          tauriScript: pnpm
          args: --target ${{ matrix.target }}
          includeUpdaterJson: true
